<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nearby Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #1a0033, #000);
    color: white;
}

.wrapper {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
}

.header {
    text-align: center;
}

.header h1 {
    font-size: 26px;
    background: linear-gradient(45deg, #ff3cac, #00f2ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.online {
    color: #00ffae;
    font-size: 14px;
    margin-top: 5px;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 15px;
    margin-top: 25px;
}

.card {
    border-radius: 15px;
    overflow: hidden;
    background: #111;
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.info {
    padding: 8px;
    font-size: 14px;
}

.cta {
    text-align: center;
    margin-top: 25px;
}

.btn {
    padding: 15px 25px;
    border-radius: 40px;
    border: none;
    font-size: 18px;
    font-weight: bold;
    background: linear-gradient(45deg, #ff3cac, #ff9a00);
    color: white;
    cursor: pointer;
}

.note {
    margin-top: 10px;
    font-size: 13px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="header">
    <h1>Someone nearby is online 👀</h1>
    <div class="online">● <span id="count">214</span> users online</div>
</div>

<div class="cards">

    <div class="card">
        <img src="lina.jpg">
        <div class="info">Lina, 21</div>
    </div>

    <div class="card">
        <img src="mia.jpg">
        <div class="info">Mia, 23</div>
    </div>

    <div class="card">
        <img src="sofia.jpg">
        <div class="info">Sofia, 22</div>
    </div>

    <div class="card">
        <img src="anna.jpg">
        <div class="info">Anna, 21</div>
    </div>

</div>

<div class="cta">
    <button class="btn" onclick="go()">
        Continue 💬
    </button>

    <div class="note">
        ✔ Nearby users • ✔ Quick access • ✔ Start chatting
    </div>
</div>

</div>

<script>
function go() {
    window.location.href = "https://t.crdtg2.com/407347/6497?bo=2753,2754,2755,2756&aff_sub5=SF_006OG000004lmDN";
}

// мягкий онлайн счётчик
setInterval(() => {
  let el = document.getElementById("count");
  let num = parseInt(el.innerText);
  el.innerText = num + Math.floor(Math.random()*3 - 1);
}, 3000);
</script>

</body>
</html>
