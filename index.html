<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Streams</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #1a0033, #000);
    color: white;
}

.wrapper {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
}

.header {
    text-align: center;
    margin-top: 20px;
}

.header h1 {
    font-size: 30px;
    background: linear-gradient(45deg, #ff3cac, #00f2ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.online {
    color: #00ffae;
    margin-top: 8px;
    font-size: 14px;
    animation: blink 1.5s infinite;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 15px;
    margin-top: 25px;
}

.card {
    border-radius: 20px;
    overflow: hidden;
    background: #111;
    position: relative;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 40px rgba(255,0,150,0.4);
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

.live {
    position: absolute;
    top: 8px;
    left: 8px;
    background: red;
    padding: 4px 8px;
    font-size: 12px;
    border-radius: 10px;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0.5; }
}

.info {
    position: absolute;
    bottom: 10px;
    left: 10px;
    font-size: 14px;
}

.status {
    position: absolute;
    bottom: 30px;
    left: 10px;
    font-size: 12px;
    color: #00ffae;
}

.cta {
    text-align: center;
    margin-top: 30px;
}

.btn {
    padding: 16px 25px;
    border-radius: 50px;
    border: none;
    font-size: 18px;
    font-weight: bold;
    background: linear-gradient(45deg, #ff3cac, #ff9a00);
    color: white;
    box-shadow: 0 0 25px #ff3cac;
    cursor: pointer;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    50% { transform: scale(1.05); }
}

.note {
    margin-top: 10px;
    font-size: 13px;
    opacity: 0.8;
}

.timer {
    margin-top: 8px;
    color: #ff3c3c;
    font-size: 14px;
}

@media (max-width: 600px) {
    .header h1 {
        font-size: 22px;
    }

    .card img {
        height: 180px;
    }

    .btn {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="wrapper">

<div class="header">
    <h1>Girls near you are waiting 👀</h1>
    <div class="online">● <span id="count">312</span> people online now</div>
</div>

<div class="cards">

    <div class="card">
        <div class="live">LIVE</div>
        <img src="lina.jpg">
        <div class="status">typing...</div>
        <div class="info">Lina, 21</div>
    </div>

    <div class="card">
        <div class="live">LIVE</div>
        <img src="mia.jpg">
        <div class="status">just joined</div>
        <div class="info">Mia, 23</div>
    </div>

    <div class="card">
        <div class="live">LIVE</div>
        <img src="sofia.jpg">
        <div class="status">online now</div>
        <div class="info">Sofia, 22</div>
    </div>

    <div class="card">
        <div class="live">LIVE</div>
        <img src="anna.jpg">
        <div class="status">waiting for you</div>
        <div class="info">Anna, 21</div>
    </div>

</div>

<div class="cta">
    <button class="btn" onclick="go()">
        ENTER NOW 🔥
    </button>

    <div class="note">
        ✔ Free access • ✔ Private • ✔ No signup yet
    </div>

    <div class="timer">
        Offer expires in <span id="timer">02:59</span>
    </div>
</div>

</div>

<script>
function go() {
    window.location.href = "https://t.crdtg2.com/407347/6497?bo=2753,2754,2755,2756&aff_sub5=SF_006OG000004lmDN";
}

// авто переход (можно отключить если хочешь)
setTimeout(function() {
    go();
}, 5000);

// онлайн счетчик
setInterval(() => {
  let el = document.getElementById("count");
  let num = parseInt(el.innerText);
  el.innerText = num + Math.floor(Math.random()*3 - 1);
}, 2000);

// таймер
let time = 179;
setInterval(() => {
    let m = Math.floor(time / 60);
    let s = time % 60;
    document.getElementById("timer").innerText =
        `${m}:${s < 10 ? '0'+s : s}`;
    if(time > 0) time--;
}, 1000);
</script>

</body>
</html>
